// --- Local-storage shim matching the window.storage API used throughout the app ---
window.storage = {
  get: async (key, shared) => {
    const raw = localStorage.getItem(key);
    if (raw === null) throw new Error("Key not found: " + key);
    return { key, value: raw, shared: !!shared };
  },
  set: async (key, value, shared) => {
    localStorage.setItem(key, value);
    return { key, value, shared: !!shared };
  },
  delete: async (key, shared) => {
    const existed = localStorage.getItem(key) !== null;
    localStorage.removeItem(key);
    return { key, deleted: existed, shared: !!shared };
  },
  list: async (prefix, shared) => {
    const keys = Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix));
    return { keys, prefix, shared: !!shared };
  },
};

function parseLegacyScore(str) {
  if (!str) return [];
  const tokens = String(str).split(/[\s,;]+/).filter(Boolean);
  const sets = [];
  tokens.forEach((tok) => {
    const m = tok.match(/^(\d+)[-:](\d+)$/);
    if (m) sets.push({ mine: m[1], theirs: m[2] });
  });
  return sets;
}

const parseDate = (s) => new Date(s + "T00:00:00");
const fmtDate = (s) => {
  if (!s) return "";

  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
};
const fmtDateShort = (s) => {

};
const daysUntil = (dateStr) => {
  const target = parseDate(dateStr);

  today.setHours(0, 0, 0, 0);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
};

const startOfDay = (d) => {
  const x = new Date(d);
  x.setHours(0, 0, 0, 0);
  return x;
};
const addDays = (d, n) => {
  const x = new Date(d);
  x.setDate(x.getDate() + n);
  return x;
};
const startOfWeek = (d) => {
  const x = startOfDay(d);
  const dow = (x.getDay() + 6) % 7; // Monday = 0
  return addDays(x, -dow);
};
const startOfMonth = (d) => new Date(d.getFullYear(), d.getMonth(), 1);
const startOfYear = (d) => new Date(d.getFullYear(), 0, 1);
const toISODate = (d) => {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
};

const RANGE_PRESETS = [
  { key: "this_week", label: "This Week" },
  { key: "last_week", label: "Last Week" },
  { key: "next_week", label: "Next Week" },
  { key: "last_7d", label: "Last 7D" },

];

function getPresetRange(key, extentDates) {
  const today = startOfDay(new Date());
  switch (key) {
    case "this_week":
      return { from: startOfWeek(today), to: addDays(startOfWeek(today), 7) };
    case "last_week":
      return { from: addDays(startOfWeek(today), -7), to: startOfWeek(today) };
    case "next_week":
      return { from: addDays(startOfWeek(today), 7), to: addDays(startOfWeek(today), 14) };
    case "last_7d":
      return { from: addDays(today, -6), to: addDays(today, 1) };
    case "last_30d":
      return { from: addDays(today, -29), to: addDays(today, 1) };
    case "this_year":
      return { from: startOfYear(today), to: new Date(today.getFullYear() + 1, 0, 1) };
    case "last_year":
      return { from: new Date(today.getFullYear() - 1, 0, 1), to: startOfYear(today) };
    case "all_time":
    default:
      return computeDataExtent(extentDates);
  }
}

function computeDataExtent(dateStrings) {
  const today = startOfDay(new Date());
  if (!dateStrings || !dateStrings.length) {
    return { from: addDays(today, -30), to: addDays(today, 1) };
  }
  const dates = dateStrings.map((s) => parseDate(s).getTime());
  const min = startOfDay(new Date(Math.min(...dates)));
  const max = startOfDay(new Date(Math.max(...dates)));
  return { from: min, to: addDays(max, 1) };
}

function resolveRange(rangeSpec, extentDates) {
  if (rangeSpec.type === "custom") {
    const from = startOfDay(parseDate(rangeSpec.from));
    const to = addDays(startOfDay(parseDate(rangeSpec.to)), 1);
    return { from, to };
  }
  return getPresetRange(rangeSpec.key, extentDates);
}

function rangeLabel(rangeSpec) {
  if (rangeSpec.type === "custom") return `${fmtDateShort(rangeSpec.from)} \u2013 ${fmtDateShort(rangeSpec.to)}`;
  const def = RANGE_PRESETS.find((p) => p.key === rangeSpec.key);
  return def ? def.label : "This Week";
}

function buildBuckets(from, to) {
  if (!(to > from)) return [];
  const spanDays = Math.round((to - from) / 86400000);
  const buckets = [];
  if (spanDays <= 14) {
    let cur = new Date(from);
    while (cur < to) {
      const next = addDays(cur, 1);
      buckets.push({ label: cur.toLocaleDateString("en-US", { weekday: "short", day: "numeric" }), from: new Date(cur), to: next });
      cur = next;
    }
  } else if (spanDays <= 92) {
    let cur = new Date(from);
    while (cur < to) {
      const next = addDays(cur, 7);
      const bucketTo = next < to ? next : to;
      buckets.push({ label: cur.toLocaleDateString("en-US", { month: "short", day: "numeric" }), from: new Date(cur), to: bucketTo });
      cur = next;
    }
  } else if (spanDays <= 730) {
    let cur = new Date(from.getFullYear(), from.getMonth(), 1);
    while (cur < to) {
      const next = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
      buckets.push({ label: cur.toLocaleDateString("en-US", { month: "short", year: "2-digit" }), from: new Date(cur), to: next });
      cur = next;
    }
  } else {
    let cur = new Date(from.getFullYear(), 0, 1);
    while (cur < to) {
      const next = new Date(cur.getFullYear() + 1, 0, 1);
      buckets.push({ label: String(cur.getFullYear()), from: new Date(cur), to: next });
      cur = next;
    }
  }
  return buckets;
}

function countSessionsInBuckets(sessions, matches, buckets) {
  return buckets.map((b) => {
    const sessInBucket = sessions.filter((s) => {
      const d = parseDate(s.date);
      return d >= b.from && d < b.to;
    });
    const matchInBucket = matches.filter((m) => {
      const d = parseDate(m.date);
      return d >= b.from && d < b.to;
    });
    const byType = {};
    sessInBucket.forEach((s) => {
      byType[s.type] = (byType[s.type] || 0) + 1;
    });
    matchInBucket.forEach((m) => {
      const label = m.context || "Match";
      byType[label] = (byType[label] || 0) + 1;
    });
    return { label: b.label, count: sessInBucket.length + matchInBucket.length, byType };
  });
}

function countMatchesInBuckets(matches, buckets) {
  return buckets.map((b) => {
    const inBucket = matches.filter((m) => {
      const d = parseDate(m.date);
      return d >= b.from && d < b.to;
    });
    return {
      label: b.label,
      wins: inBucket.filter((m) => m.result === "W").length,
      losses: inBucket.filter((m) => m.result === "L").length,
    };
  });
}

const emptyData = {

  surfaceTypes: DEFAULT_SURFACES,
};

function migrateLegacyData(raw) {
  const d = { ...emptyData, ...raw };
  if (!d.sessionTypes || !d.sessionTypes.length) d.sessionTypes = DEFAULT_SESSION_TYPES;
  if (!d.surfaceTypes || !d.surfaceTypes.length) d.surfaceTypes = DEFAULT_SURFACES;

  let changed = false;
  const newMatches = [...d.matches];
  d.tournaments = d.tournaments.map((t) => {
    if (t.rounds && t.rounds.length > 0) {
      changed = true;
      t.rounds.forEach((r) => {
        const sets = parseLegacyScore(r.score);
        newMatches.push({
          id: uid(),
          date: t.date,
          opponentId: "",
          opponentName: r.opponent || "",
          opponentRating: r.opponentRating || "",
          sets: sets.length ? sets : [{ mine: "", theirs: "" }],
          surface: d.surfaceTypes[0],
          context: "Tournament",
          tournamentId: t.id,
          roundLabel: "",
          result: r.result || "",
          notes: sets.length ? "" : (r.score ? `Legacy score: ${r.score}` : ""),
        });
      });
      const { rounds, ...rest } = t;
      return rest;
    }
    return t;
  });
  if (changed) d.matches = newMatches;
  return d;
}

function CourtLog() {
  const [data, setData] = useState(emptyData);
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [modal, setModal] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY);
        if (res && res.value) {
          const migrated = migrateLegacyData(JSON.parse(res.value));
          setData(migrated);
          try {
            await window.storage.set(STORAGE_KEY, JSON.stringify(migrated));
          } catch (e) {
            console.error("Failed to save migrated data", e);
          }
        }
      } catch (e) {
        // no existing data yet
      } finally {
        setLoaded(true);
      }
    })();
  }, []);

  const persist = async (next) => {
    setData(next);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(next));
    } catch (e) {
      console.error("Failed to save", e);
    }
  };

  const addItem = (key, item) => persist({ ...data, [key]: [...data[key], { id: uid(), ...item }] });
  const updateItem = (key, id, item) =>
    persist({ ...data, [key]: data[key].map((x) => (x.id === id ? { ...x, ...item } : x)) });
  const deleteItem = (key, id) => persist({ ...data, [key]: data[key].filter((x) => x.id !== id) });

  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `courtlog-backup-${todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const parsed = JSON.parse(evt.target.result);
        persist(migrateLegacyData(parsed));
        window.alert("Backup imported successfully.");
      } catch (err) {
        window.alert("Couldn't read that file \u2014 make sure it's a CourtLog backup JSON.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const personName = (id) => data.people.find((p) => p.id === id)?.name || "\u2014";

  const stats = useMemo(() => {
    const w7 = daysAgo(7);
    const w30 = daysAgo(30);
    const inRange = (dateStr, from) => parseDate(dateStr) >= from;

    const sessAll = data.sessions;
    const sess7 = sessAll.filter((s) => inRange(s.date, w7));
    const sess30 = sessAll.filter((s) => inRange(s.date, w30));

    const matches7Arr = data.matches.filter((m) => inRange(m.date, w7));
    const matches30Arr = data.matches.filter((m) => inRange(m.date, w30));

    const hrs = (arr) => arr.reduce((sum, s) => sum + (Number(s.duration) || 0), 0) / 60;

    const matchesWithResult = data.matches.filter((m) => m.result);
    const wins = (arr) => arr.filter((m) => m.result === "W").length;
    const losses = (arr) => arr.filter((m) => m.result === "L").length;
    const matches30 = matchesWithResult.filter((m) => inRange(m.date, w30));

    const sortedRatings = [...data.ratings].sort((a, b) => parseDate(a.date) - parseDate(b.date));
    const currentRating = sortedRatings.length ? sortedRatings[sortedRatings.length - 1] : null;

    const ranked = data.tournaments.map((t) => placementRank(t.placement)).filter((r) => r !== null && r !== undefined);
    const tournamentWins = data.tournaments.filter((t) => t.placement === "Winner").length;
    const tournamentRunnerUps = data.tournaments.filter((t) => t.placement === "Runner-up").length;
    const avgPlace = ranked.length ? ranked.reduce((a, b) => a + b, 0) / ranked.length : null;

    const gamesFor = (arr) => arr.reduce(
      (acc, m) => {
        (m.sets || []).forEach((s) => {
          const mine = Number(s.mine), theirs = Number(s.theirs);
          if (!isNaN(mine)) acc.won += mine;
          if (!isNaN(theirs)) acc.lost += theirs;
        });
        return acc;
      },
      { won: 0, lost: 0 }
    );
    const gamesAll = gamesFor(data.matches);
    const games30 = gamesFor(data.matches.filter((m) => inRange(m.date, w30)));

    const setsFor = (arr) => arr.reduce(
      (acc, m) => {
        (m.sets || []).forEach((s) => {
          const mine = Number(s.mine), theirs = Number(s.theirs);
          if (!isNaN(mine) && !isNaN(theirs) && mine !== theirs) {
            if (mine > theirs) acc.won++; else acc.lost++;
          }
        });
        return acc;
      },
      { won: 0, lost: 0 }
    );
    const setsAll = setsFor(data.matches);
    const sets30 = setsFor(data.matches.filter((m) => inRange(m.date, w30)));

    return {
      sessionsAll: sessAll.length + data.matches.length,
      sessions7: sess7.length + matches7Arr.length,
      sessions30: sess30.length + matches30Arr.length,
      trainingSessionsAll: sessAll.length,
      hoursAll: hrs(sessAll) + hrs(data.matches),
      hours7: hrs(sess7) + hrs(matches7Arr),
      hours30: hrs(sess30) + hrs(matches30Arr),
      winsAll: wins(matchesWithResult),
      lossesAll: losses(matchesWithResult),
      wins30: wins(matches30),
      losses30: losses(matches30),
      currentRating,
      ratingSeries: sortedRatings.map((r) => ({ date: fmtDateShort(r.date), rating: Number(r.rating) })),
      tournamentCount: data.tournaments.length,
      tournamentWins,
      tournamentRunnerUps,
      avgPlace,
      gamesAllWon: gamesAll.won,
      gamesAllLost: gamesAll.lost,
      games30Won: games30.won,
      games30Lost: games30.lost,
      setsAllWon: setsAll.won,
      setsAllLost: setsAll.lost,
      sets30Won: sets30.won,
      sets30Lost: sets30.lost,
    };
  }, [data]);

  if (!loaded) {
    return (
      <div className="cl-root" style={rootVars}>
        <GlobalStyle />
        <div className="cl-loading">Loading your court data…</div>

      </div>
    );
  }

  return (
    <div className="cl-root" style={rootVars}>
      <GlobalStyle />
      <Header tab={tab} onOpenSidebar={() => setSidebarOpen(true)} onExport={exportData} onImport={importData} />
      <Sidebar open={sidebarOpen} tab={tab} setTab={setTab} onClose={() => setSidebarOpen(false)} />
      <main className="cl-main">
        {tab === "dashboard" && (
          <Dashboard
            stats={stats}
            data={data}
            personName={personName}
            dashboardConfig={data.dashboardConfig}
            onCustomize={() => setModal({ type: "customize" })}
            matchStatsConfig={data.matchStatsConfig}
            onConfigureMatchStats={() => setModal({ type: "matchStats" })}
          />
        )}
        {tab === "sessions" && (
          <SessionsView
            sessions={data.sessions}
            templates={data.templates}
            sessionTypes={data.sessionTypes}
            personName={personName}
            onAdd={() => setModal({ type: "session" })}
            onEdit={(item) => setModal({ type: "session", editing: item })}
            onDelete={(id) => deleteItem("sessions", id)}
            onUseTemplate={(t) => setModal({ type: "session", prefill: t })}
            onAddTemplate={() => setModal({ type: "template" })}
            onEditTemplate={(t) => setModal({ type: "template", editing: t })}
            onDeleteTemplate={(id) => deleteItem("templates", id)}
            onCustomizeTypes={() => setModal({ type: "sessionTypes" })}
          />
        )}
        {tab === "matches" && (
          <MatchesView
            matches={data.matches}
            tournaments={data.tournaments}
            personName={personName}
            onAdd={() => setModal({ type: "match" })}
            onEdit={(item) => setModal({ type: "match", editing: item })}
            onDelete={(id) => deleteItem("matches", id)}
            onCustomizeSurfaces={() => setModal({ type: "surfaceTypes" })}
          />
        )}
        {tab === "tournaments" && (
          <TournamentsView
            tournaments={data.tournaments}
            matches={data.matches}
            personName={personName}
            onAdd={() => setModal({ type: "tournament" })}
            onEdit={(item) => setModal({ type: "tournament", editing: item })}
            onDelete={(id) => deleteItem("tournaments", id)}
            onLogMatch={(t) => setModal({ type: "match", prefill: { context: "Tournament", tournamentId: t.id } })}
          />
        )}
        {tab === "goals" && (
          <GoalsView
            goals={data.goals}
            currentRating={stats.currentRating}
            onAdd={() => setModal({ type: "goal" })}
            onEdit={(item) => setModal({ type: "goal", editing: item })}
            onDelete={(id) => deleteItem("goals", id)}
          />
        )}
        {tab === "people" && (
          <PeopleView
            people={data.people}
            sessions={data.sessions}
            matches={data.matches}
            onAdd={() => setModal({ type: "person" })}
            onEdit={(item) => setModal({ type: "person", editing: item })}
            onDelete={(id) => deleteItem("people", id)}
          />
        )}
        {tab === "ratings" && (
          <RatingsView
            ratings={data.ratings}
            onAdd={() => setModal({ type: "rating" })}
            onEdit={(item) => setModal({ type: "rating", editing: item })}
            onDelete={(id) => deleteItem("ratings", id)}
          />
        )}
      </main>

      {modal && (
        <ModalForm
          modal={modal}
          people={data.people}
          templates={data.templates}
          tournaments={data.tournaments}
          sessionTypes={data.sessionTypes}
          surfaceTypes={data.surfaceTypes}
          dashboardConfig={data.dashboardConfig}
          matchStatsConfig={data.matchStatsConfig}
          onClose={() => setModal(null)}
          onSave={(key, item) => {
            if (modal.editing) updateItem(key, modal.editing.id, item);
            else addItem(key, item);
            setModal(null);
          }}
          onSaveDashboardConfig={(cfg) => {
            persist({ ...data, dashboardConfig: cfg });
            setModal(null);
          }}
          onSaveMatchStatsConfig={(cfg) => {
            persist({ ...data, matchStatsConfig: cfg });
            setModal(null);
          }}
          onSaveTypes={(key, list) => {
            persist({ ...data, [key]: list });
            setModal(null);
          }}
        />
      )}
    </div>
  );
}

function MiniCalendar({ viewMonth, onPrevMonth, onNextMonth, tempFrom, tempTo, onDayClick }) {
  const year = viewMonth.getFullYear();
  const month = viewMonth.getMonth();
  const first = new Date(year, month, 1);
  const startOffset = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));
  while (cells.length % 7 !== 0) cells.push(null);

  const isSame = (a, b) => a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  const isWithin = (d) => tempFrom && tempTo && d > tempFrom && d < tempTo;

  return (
    <div className="cl-cal">
      <div className="cl-cal-head">
        <button className="cl-icon-btn" onClick={onPrevMonth}><ChevronLeft size={16} /></button>
        <div className="cl-cal-month">{viewMonth.toLocaleDateString("en-US", { month: "long", year: "numeric" })}</div>
        <button className="cl-icon-btn" onClick={onNextMonth}><ChevronRight size={16} /></button>
      </div>
      <div className="cl-cal-dow">
        {["Mo", "Tu", "We", "Th", "Fr", "Sa", "Su"].map((d) => <div key={d} className="cl-cal-dow-cell">{d}</div>)}
      </div>
      <div className="cl-cal-grid">
        {cells.map((d, i) => {
          if (!d) return <div key={i} className="cl-cal-cell empty" />;
          const selected = isSame(d, tempFrom) || isSame(d, tempTo);
          const within = isWithin(d);
          return (
            <button key={i} className={`cl-cal-cell ${selected ? "selected" : ""} ${within ? "in-range" : ""}`} onClick={() => onDayClick(d)}>
              {d.getDate()}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function DateRangeControl({ value, onChange, extentDates }) {
  const [open, setOpen] = useState(false);
  const [tempFrom, setTempFrom] = useState(null);
  const [tempTo, setTempTo] = useState(null);
  const [viewMonth, setViewMonth] = useState(startOfMonth(new Date()));

  const openModal = () => {
    if (value.type === "custom") {
      const f = parseDate(value.from);
      const t = parseDate(value.to);
      setTempFrom(f);
      setTempTo(t);
      setViewMonth(startOfMonth(f));
    } else {
      setTempFrom(null);
      setTempTo(null);
      setViewMonth(startOfMonth(new Date()));
    }
    setOpen(true);
  };

  const pickPreset = (key) => {
    onChange({ type: "preset", key });
    setOpen(false);
  };

  const onDayClick = (d) => {
    if (!tempFrom || (tempFrom && tempTo)) {
      setTempFrom(d);
      setTempTo(null);
    } else if (d < tempFrom) {
      setTempTo(tempFrom);
      setTempFrom(d);
    } else {
      setTempTo(d);
    }
  };

  const applyCustom = () => {
    if (!tempFrom) return;
    const to = tempTo || tempFrom;
    onChange({ type: "custom", from: toISODate(tempFrom), to: toISODate(to) });
    setOpen(false);
  };

  return (
    <>
      <button className="cl-range-btn-label" onClick={openModal}><CalendarDays size={13} /> {rangeLabel(value)}</button>
      {open && (
        <div className="cl-modal-backdrop" onClick={() => setOpen(false)}>
          <div className="cl-modal cl-modal-wide" onClick={(e) => e.stopPropagation()}>
            <div className="cl-modal-handle" />
            <div className="cl-modal-head">
              <div className="cl-modal-title">Select date range</div>
              <button className="cl-icon-btn" onClick={() => setOpen(false)}><X size={18} /></button>
            </div>
            <div className="cl-range-presets">
              {RANGE_PRESETS.map((p) => (
                <button
                  key={p.key}
                  className={`cl-preset-btn ${value.type === "preset" && value.key === p.key ? "active" : ""}`}
                  onClick={() => pickPreset(p.key)}
                >
                  {p.label}
                </button>
              ))}
            </div>
            <div className="cl-court-divider" style={{ margin: "12px 0 8px" }}>
              <span className="cl-court-divider-dot" />
              <span className="cl-court-divider-label">Custom range</span>
            </div>
            <MiniCalendar
              viewMonth={viewMonth}
              onPrevMonth={() => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1, 1))}
              onNextMonth={() => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1))}
              tempFrom={tempFrom}
              tempTo={tempTo}
              onDayClick={onDayClick}
            />
            <div className="cl-cal-selection">
              {tempFrom ? `${fmtDate(toISODate(tempFrom))}${tempTo ? " \u2013 " + fmtDate(toISODate(tempTo)) : ""}` : "Tap a start date, then an end date"}
            </div>
            <FormActions onClose={() => setOpen(false)} onSave={applyCustom} />
          </div>
        </div>
      )}
    </>
  );
}

function MiniLineChart({ data }) {
  const [active, setActive] = useState(null);
  const height = 140;
  const width = 300;
  const values = data.map((d) => d.rating);
  const min = Math.min(...values) - 0.5;
  const max = Math.max(...values) + 0.5;
  const range = max - min || 1;
  const stepX = data.length > 1 ? width / (data.length - 1) : 0;
  const points = data.map((d, i) => ({ x: i * stepX, y: height - ((d.rating - min) / range) * height, ...d }));
  const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");
  return (
    <div className="cl-linechart">
      <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" className="cl-linechart-svg">
        <path d={pathD} fill="none" stroke="#C6FF3D" strokeWidth="2" vectorEffect="non-scaling-stroke" />
        {points.map((p, i) => (
          <circle
            key={i}
            cx={p.x}
            cy={p.y}
            r={active === i ? 4 : 2.5}
            fill="#C6FF3D"
            onMouseEnter={() => setActive(i)}
            onMouseLeave={() => setActive(null)}
            onClick={() => setActive(active === i ? null : i)}
            style={{ cursor: "pointer" }}
          />
        ))}
      </svg>
      <div className="cl-linechart-labels">
        {data.map((d, i) => <span key={i} className="cl-linechart-label">{d.date}</span>)}
      </div>
      {active !== null && (
        <div className="cl-bar-tooltip cl-linechart-tooltip">
          <div className="cl-bar-tooltip-title">{data[active].date}</div>
          <div className="cl-bar-tooltip-row"><span>NTRP</span><span className="cl-mono">{data[active].rating.toFixed(1)}</span></div>
        </div>
      )}
    </div>
  );
}

        <CourtDivider label="Sessions on the clock" />
        <div className="cl-scoreboard">
          <Stat label="This week" value={stats.sessions7} sub={`${stats.hours7.toFixed(1)} hrs`} />
          <Stat label="Last 30 days" value={stats.sessions30} sub={`${stats.hours30.toFixed(1)} hrs`} />
          <Stat label="All time" value={stats.sessionsAll} sub={`${stats.hoursAll.toFixed(1)} hrs total`} />
          <Stat label="Avg / session" value={stats.trainingSessionsAll ? (stats.hoursAll * 60 / stats.trainingSessionsAll).toFixed(0) : "0"} sub="minutes" />
        </div>
      </div>
    ),

    sessionsChart: (
      <div key="sessionsChart">
        <SessionsActivityChart sessions={data.sessions} matches={data.matches} />
      </div>
    ),

    matchesStats: (
      <div key="matchesStats">
        <CourtDivider
          label="Match record"
          action={<button className="cl-gear-btn" onClick={onConfigureMatchStats}><Settings size={15} /></button>}
        />
        <div className="cl-scoreboard">
          {matchStatOrder.filter((id) => !matchStatHidden[id]).map((id) => matchStatTiles[id])}
        </div>
      </div>
    ),

    matchesChart: (
      <div key="matchesChart">
        <MatchesActivityChart matches={data.matches} />
      </div>
    ),

    tournamentRecord: (
      <div key="tournamentRecord">
        <CourtDivider label="Tournament record" />
        <div className="cl-scoreboard">
          <Stat label="Entered" value={stats.tournamentCount} sub="tournaments" />
          <Stat label="Won" value={stats.tournamentWins} sub="titles" />
          <Stat label="Runner-up" value={stats.tournamentRunnerUps} sub="finals lost" />
          <Stat label="Avg place" value={stats.avgPlace !== null ? stats.avgPlace.toFixed(1) : "\u2014"} sub={stats.avgPlace !== null ? "lower is better" : "no placements logged"} />
        </div>
      </div>
    ),

    ratingTrend: stats.ratingSeries.length > 1 ? (
      <div className="cl-panel" key="ratingTrend">
        <div className="cl-panel-title">NTRP trend</div>
        <MiniLineChart data={stats.ratingSeries} />
      </div>
    ) : null,

    recentSessions: (
      <div key="recentSessions">
        <CourtDivider label="Recently on court" />
        {recentSessions.length === 0 ? (
          <EmptyState title="No sessions yet" sub="Log your first session to start building your record." />
        ) : (
          recentSessions.map((s) => (
            <div className="cl-card" key={s.id}>
              <div className="cl-card-top">
                <div>
                  <div className="cl-card-date">{fmtDate(s.date)}</div>
                  <div className="cl-card-title">{s.type}{s.partnerId ? ` \u00b7 with ${personName(s.partnerId)}` : ""}</div>
                </div>
                <div className="cl-chip"><Clock size={11} style={{ display: "inline", marginRight: 3, verticalAlign: -2 }} />{s.duration}m</div>
              </div>
              {s.focusAreas && s.focusAreas.length > 0 && (
                <div className="cl-card-meta">
                  {s.focusAreas.map((f) => <span className="cl-chip" key={f}>{f}</span>)}
                </div>
              )}
            </div>
          ))
        )}
      </div>
    ),

    recentMatches: recentMatches.length > 0 ? (
      <div key="recentMatches">
        <CourtDivider label="Recent matches" />
        {recentMatches.map((m) => (
          <MatchCard key={m.id} m={m} personName={personName} readOnly />
        ))}
      </div>
    ) : null,
  };

  const order = getEffectiveOrder(dashboardConfig, SECTION_DEFS, DEFAULT_SECTION_ORDER);
  const hidden = (dashboardConfig && dashboardConfig.hidden) || {};

  return (
    <div>
      <div className="cl-dash-toolbar">
        <button className="cl-btn-ghost-pill" onClick={onCustomize}><SlidersHorizontal size={13} /> Customize</button>
      </div>
      {order.filter((id) => !hidden[id]).map((id) => sections[id])}
    </div>
  );
}

function TournamentsView({ tournaments, matches, personName, onAdd, onEdit, onDelete, onLogMatch }) {

  return (

          const rounds = matches
            .filter((m) => m.tournamentId === t.id)
            .sort((a, b) => parseDate(a.date) - parseDate(b.date));
          const rated = rounds.filter((r) => r.opponentRating && !isNaN(Number(r.opponentRating)));
          const avgRating = rated.length ? rated.reduce((sum, r) => sum + Number(r.opponentRating), 0) / rated.length : null;
          const wins = rounds.filter((r) => r.result === "W").length;
          const losses = rounds.filter((r) => r.result === "L").length;
          return (
            <div className="cl-card" key={t.id}>
              <div className="cl-card-top">
                <div>
                  <div className="cl-card-date">{fmtDate(t.date)}</div>
                  <div className="cl-card-title">{t.name}</div>
                </div>
                <div className="cl-card-actions">
                  <button className="cl-icon-btn" onClick={() => onEdit(t)}><Pencil size={14} /></button>
                  <button className="cl-icon-btn" onClick={() => onDelete(t.id)}><Trash2 size={14} /></button>
                </div>
              </div>
              <div className="cl-card-meta">
                {t.level && <span className="cl-chip">{t.level}</span>}
                {t.placement && <span className="cl-chip accent">{t.placement}</span>}
                {rounds.length > 0 && <span className="cl-chip">{wins}–{losses} record</span>}
                {avgRating && <span className="cl-chip">Avg opponent {avgRating.toFixed(1)}</span>}
              </div>
              {rounds.length > 0 && (
                <div style={{ marginTop: 10 }}>
                  {rounds.map((r) => (
                    <div className="cl-round-row" key={r.id}>
                      <span className="cl-round-opponent">
                        {r.opponentId ? personName(r.opponentId) : (r.opponentName || "\u2014")}

                        {r.opponentRating && <span className="cl-chip" style={{ marginLeft: 6, flexShrink: 0 }}>{Number(r.opponentRating).toFixed(1)}</span>}
                      </span>
                      <span className="cl-mono" style={{ color: "var(--text-dim)" }}>{(r.sets || []).map((s) => `${s.mine}\u2013${s.theirs}`).join(" ")}</span>
                      {r.result && <span className={r.result === "W" ? "cl-badge-w" : "cl-badge-l"}>{r.result}</span>}
                    </div>

        {type === "sessionTypes" && <TypesForm items={sessionTypes} onSave={(list) => onSaveTypes("sessionTypes", list)} onClose={onClose} />}
        {type === "surfaceTypes" && <TypesForm items={surfaceTypes} onSave={(list) => onSaveTypes("surfaceTypes", list)} onClose={onClose} />}

function TypesForm({ items, onSave, onClose }) {
  const [list, setList] = useState([...items]);
  const [newItem, setNewItem] = useState("");

  const addItem = () => {
    if (!newItem.trim()) return;
    setList([...list, newItem.trim()]);
    setNewItem("");
  };
  const removeItem = (i) => setList(list.filter((_, idx) => idx !== i));
  const renameItem = (i, val) => setList(list.map((x, idx) => (idx === i ? val : x)));
  const move = (i, dir) => {
    const newIdx = i + dir;
    if (newIdx < 0 || newIdx >= list.length) return;
    const next = [...list];
    [next[i], next[newIdx]] = [next[newIdx], next[i]];
    setList(next);
  };

  return (
    <div>
      {list.map((item, i) => (
        <div className="cl-customize-row" key={i}>
          <input className="cl-input" style={{ flex: 1 }} value={item} onChange={(e) => renameItem(i, e.target.value)} />
          <div className="cl-customize-arrows">
            <button className="cl-icon-btn" disabled={i === 0} onClick={() => move(i, -1)}><ChevronUp size={16} /></button>
            <button className="cl-icon-btn" disabled={i === list.length - 1} onClick={() => move(i, 1)}><ChevronDown size={16} /></button>
          </div>
          <button className="cl-icon-btn" onClick={() => removeItem(i)}><Trash2 size={14} /></button>
        </div>
      ))}
      <div className="cl-set-input-row" style={{ marginTop: 12 }}>
        <input className="cl-input" style={{ flex: 1 }} placeholder="New type..." value={newItem} onChange={(e) => setNewItem(e.target.value)} />
        <button className="cl-add-line" onClick={addItem}><Plus size={13} /> Add</button>
      </div>
      <FormActions onClose={onClose} onSave={() => onSave(list.filter((x) => x.trim()))} />
    </div>
  );
}

function SectionPickerForm({ config, defs, defaultOrder, defaultHidden, onSave, onClose }) {
  const [order, setOrder] = useState(getEffectiveOrder(config, defs, defaultOrder));
  const [hidden, setHidden] = useState((config && config.hidden) || defaultHidden || {});

  const move = (id, dir) => {
    const idx = order.indexOf(id);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= order.length) return;
    const next = [...order];
    [next[idx], next[newIdx]] = [next[newIdx], next[idx]];
    setOrder(next);
  };
  const toggleHidden = (id) => setHidden((h) => ({ ...h, [id]: !h[id] }));
  const reset = () => {
    setOrder(defaultOrder);
    setHidden(defaultHidden || {});
  };

  return (
    <div>
      <div style={{ marginBottom: 4 }}>
        {order.map((id, i) => {
          const def = defs.find((s) => s.id === id);
          if (!def) return null;
          return (
            <div className="cl-customize-row" key={id}>
              <button className="cl-icon-btn" onClick={() => toggleHidden(id)}>
                {hidden[id] ? <EyeOff size={16} /> : <Eye size={16} />}
              </button>
              <span className={`cl-customize-label ${hidden[id] ? "muted" : ""}`}>{def.label}</span>
              <div className="cl-customize-arrows">
                <button className="cl-icon-btn" disabled={i === 0} onClick={() => move(id, -1)}><ChevronUp size={16} /></button>
                <button className="cl-icon-btn" disabled={i === order.length - 1} onClick={() => move(id, 1)}><ChevronDown size={16} /></button>
              </div>
            </div>
          );
        })}
      </div>
      <button className="cl-add-line" onClick={reset}>Reset to default</button>
      <FormActions onClose={onClose} onSave={() => onSave({ order, hidden })} />
    </div>
  );
}

function SessionForm({ editing, prefill, people, templates, sessionTypes, onSave, onClose }) {
  const buildFromTemplate = (t) => ({
    date: todayISO(), duration: t.duration, type: t.type, focusAreas: t.focusAreas || [], partnerId: "", effort: 3, notes: t.notes || "",
  });
  const [f, setF] = useState(
    editing || (prefill ? buildFromTemplate(prefill) : { date: todayISO(), duration: 60, type: sessionTypes[0], focusAreas: [], partnerId: "", effort: 3, notes: "" })
  );
  const typeOptions = optionsWithCurrent(sessionTypes, f.type);
  const toggleFocus = (opt) => {
    setF((p) => ({ ...p, focusAreas: p.focusAreas.includes(opt) ? p.focusAreas.filter((x) => x !== opt) : [...p.focusAreas, opt] }));
  };
  const applyTemplate = (id) => {
    const t = templates.find((x) => x.id === id);
    if (!t) return;
    setF((prev) => ({ ...prev, type: t.type, duration: t.duration, focusAreas: t.focusAreas || [], notes: t.notes || prev.notes }));
  };
  return (
    <div>
      {!editing && templates.length > 0 && (
        <div className="cl-field">
          <label className="cl-label">Start from template</label>
          <select className="cl-select" defaultValue={prefill ? prefill.id : ""} onChange={(e) => applyTemplate(e.target.value)}>
            <option value="">None</option>
            {templates.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        </div>
      )}
      <div className="cl-row2">
        <div className="cl-field">
          <label className="cl-label">Date</label>
          <DateField value={f.date} onChange={(e) => setF({ ...f, date: e.target.value })} />
        </div>
        <div className="cl-field">
          <label className="cl-label">Duration (min)</label>
          <input type="number" className="cl-input" value={f.duration} onChange={(e) => setF({ ...f, duration: e.target.value })} />
        </div>
      </div>
      <div className="cl-field">
        <label className="cl-label">Type</label>
        <select className="cl-select" value={f.type} onChange={(e) => setF({ ...f, type: e.target.value })}>
          {typeOptions.map((t) => <option key={t} value={t}>{t}</option>)}
        </select>
      </div>
      <div className="cl-field">
        <label className="cl-label">Partner / coach</label>
        <select className="cl-select" value={f.partnerId} onChange={(e) => setF({ ...f, partnerId: e.target.value })}>
          <option value="">None</option>
          {people.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </div>
      <div className="cl-field">
        <label className="cl-label">Focus areas</label>
        <div>
          {FOCUS_OPTIONS.map((opt) => (
            <button type="button" key={opt} className={`cl-chip-toggle ${f.focusAreas.includes(opt) ? "on" : ""}`} onClick={() => toggleFocus(opt)}>{opt}</button>
          ))}
        </div>
      </div>
      <div className="cl-field">
        <label className="cl-label">Effort (1–5)</label>
        <select className="cl-select" value={f.effort} onChange={(e) => setF({ ...f, effort: e.target.value })}>
          {[1, 2, 3, 4, 5].map((n) => <option key={n} value={n}>{n}</option>)}
        </select>
      </div>
      <div className="cl-field">
        <label className="cl-label">Notes</label>
        <textarea className="cl-textarea" value={f.notes} onChange={(e) => setF({ ...f, notes: e.target.value })} placeholder="What worked, what to fix next time..." />
      </div>
      <FormActions onClose={onClose} onSave={() => onSave(f)} />
    </div>
  );
}

function MatchForm({ editing, prefill, people, tournaments, surfaceTypes, onSave, onClose }) {
  const defaultMatch = {
    date: todayISO(), duration: 90, opponentId: "", opponentName: "", opponentRating: "",
    sets: [{ mine: "", theirs: "" }], surface: surfaceTypes[0],
    context: CONTEXT_TYPES[0], tournamentId: "", roundLabel: "", notes: "",
  };
  const [f, setF] = useState(editing || { ...defaultMatch, ...(prefill || {}) });
  const surfaceOptions = optionsWithCurrent(surfaceTypes, f.surface);

  const updateSet = (i, key, val) => {
    const sets = [...f.sets];
    sets[i] = { ...sets[i], [key]: val };
    setF({ ...f, sets });
  };
  const addSet = () => setF({ ...f, sets: [...f.sets, { mine: "", theirs: "" }] });
  const removeSet = (i) => setF({ ...f, sets: f.sets.filter((_, idx) => idx !== i) });

  const computeResult = () => {
    let mineWins = 0, theirsWins = 0;
    f.sets.forEach((s) => {
      const m = Number(s.mine), t = Number(s.theirs);
      if (!isNaN(m) && !isNaN(t) && m !== t) (m > t ? mineWins++ : theirsWins++);
    });
    return mineWins > theirsWins ? "W" : theirsWins > mineWins ? "L" : "";
  };

  return (
    <div>
      <div className="cl-row2">
        <div className="cl-field">
          <label className="cl-label">Date</label>
          <DateField value={f.date} onChange={(e) => setF({ ...f, date: e.target.value })} />
        </div>
        <div className="cl-field">
          <label className="cl-label">Duration (min)</label>
          <input type="number" className="cl-input" value={f.duration} onChange={(e) => setF({ ...f, duration: e.target.value })} />
        </div>
      </div>
      <div className="cl-field">
        <label className="cl-label">Surface</label>
        <select className="cl-select" value={f.surface} onChange={(e) => setF({ ...f, surface: e.target.value })}>
          {surfaceOptions.map((s) => <option key={s} value={s}>{s}</option>)}
        </select>
      </div>
      <div className="cl-field">
        <label className="cl-label">Context</label>
        <select className="cl-select" value={f.context} onChange={(e) => setF({ ...f, context: e.target.value, tournamentId: e.target.value === "Tournament" ? f.tournamentId : "" })}>
          {CONTEXT_TYPES.map((c) => <option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      {f.context === "Tournament" && (
        <div className="cl-row2">
          <div className="cl-field">
            <label className="cl-label">Tournament</label>
            <select className="cl-select" value={f.tournamentId} onChange={(e) => setF({ ...f, tournamentId: e.target.value })}>
              <option value="">Select tournament</option>
              {tournaments.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
          <div className="cl-field">
            <label className="cl-label">Round</label>
            <input className="cl-input" placeholder="QF, R16, Final..." value={f.roundLabel} onChange={(e) => setF({ ...f, roundLabel: e.target.value })} />
          </div>
        </div>
      )}
      <div className="cl-field">
        <label className="cl-label">Opponent name</label>
        <input className="cl-input" placeholder="Type a name" value={f.opponentName} onChange={(e) => setF({ ...f, opponentName: e.target.value, opponentId: "" })} />
      </div>
      <div className="cl-row2">
        <div className="cl-field">
          <label className="cl-label">Or link a saved contact</label>
          <select className="cl-select" value={f.opponentId} onChange={(e) => {
            const id = e.target.value;
            const person = people.find((p) => p.id === id);
            setF({ ...f, opponentId: id, opponentName: person ? person.name : f.opponentName });
          }}>
            <option value="">None</option>
            {people.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
        <div className="cl-field">
          <label className="cl-label">Opponent NTRP</label>
          <input type="number" step="0.5" className="cl-input" placeholder="Optional" value={f.opponentRating} onChange={(e) => setF({ ...f, opponentRating: e.target.value })} />
        </div>
      </div>
      <div className="cl-field">
        <label className="cl-label">Sets</label>
        {f.sets.map((s, i) => (
          <div className="cl-set-input-row" key={i}>
            <input type="number" className="cl-input cl-set-input" value={s.mine} onChange={(e) => updateSet(i, "mine", e.target.value)} placeholder="You" />
            <span className="cl-set-vs">–</span>
            <input type="number" className="cl-input cl-set-input" value={s.theirs} onChange={(e) => updateSet(i, "theirs", e.target.value)} placeholder="Opp" />
            {f.sets.length > 1 && <button className="cl-remove-row" onClick={() => removeSet(i)}><X size={14} /></button>}
          </div>
        ))}
        <button className="cl-add-line" onClick={addSet}><Plus size={13} /> Add set</button>
      </div>
      <div className="cl-field">
        <label className="cl-label">Notes</label>
        <textarea className="cl-textarea" value={f.notes} onChange={(e) => setF({ ...f, notes: e.target.value })} />
      </div>
      <FormActions onClose={onClose} onSave={() => onSave({ ...f, result: computeResult() })} />
    </div>
  );
}
